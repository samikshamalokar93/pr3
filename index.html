<!DOCTYPE html>
<html>
<head>
<title>Frame Example</title>
</head>

<frameset rows="15%,75%,10%">

    <!-- Header Frame -->
    <frame src="header.html" name="header">

    <!-- Left and Right Frames -->
    <frameset cols="30%,70%">
        <frame src="left.html" name="left">
        <frame src="home.html" name="right">
    </frameset>

    <!-- Status Bar Frame -->
    <frame src="status.html" name="status">

</frameset>

</html>
